<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOR THREE BOT | Tienda Oficial</title>
<style>
:root{--celeste:#00D9FF;--negro:#0a0a0a;--gris:#1a1a1a;--gris2:#222;--verde:#00FF88;--morado:#A855F7;--rojo:#FF4D4D}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{color:#fff;text-align:center;min-height:100vh;padding:0;
  background: linear-gradient(180deg, #0a0a0a 0%, #121212 100%); /* FONDO NEGRO SUAVE NUEVO */
  background-attachment: fixed;
}
.box{max-width:500px;margin:20px auto;background:rgba(26,26,26,0.95);border:1px solid var(--celeste);border-radius:16px;padding:25px;backdrop-filter: blur(5px)}
.verificado{background:rgba(0,255,136,0.1);border:1px solid var(--verde);border-radius:12px;padding:15px;margin:15px 20px;text-align:center}
.verificado b{color:var(--verde);font-size:16px}
.verificado p{color:#ccc;font-size:13px;margin-top:5px}
.oferta-box{background:rgba(168,85,247,0.1);border:1px solid var(--morado);border-radius:12px;padding:12px;margin-bottom:15px;text-align:center}
.oferta-box b{color:var(--morado);font-size:14px}
.oferta-box p{color:#ccc;font-size:12px;margin-top:4px}
.tachado{color:#888;text-decoration:line-through;font-size:20px;margin-right:8px}
header{padding:30px 20px;border-bottom:2px solid var(--celeste);background:rgba(18,18,18,0.8);backdrop-filter: blur(6px)} /* HEADER MÁS OSCURO */
h1{color:var(--celeste);font-size:34px;letter-spacing:2px;text-shadow:0 0 12px var(--celeste)}
.slogan{color:#ddd;margin-top:5px;font-size:14px;text-shadow:0 0 5px #000}
.container{max-width:500px;margin:auto;padding:20px}
.card{background:rgba(26,26,26,0.92);border:1px solid var(--celeste);border-radius:12px;padding:15px;margin:12px 0;text-align:left;backdrop-filter: blur(4px);transition:.2s;position:relative}
.card:hover{transform:scale(1.02);box-shadow:0 0 15px var(--celeste)}
.tag-oferta{position:absolute;top:10px;right:10px;background:var(--rojo);color:#fff;font-size:11px;font-weight:bold;padding:4px 8px;border-radius:6px}
.nombre{font-weight:bold;font-size:16px;display:flex;align-items:center;gap:8px}
.precio{color:var(--celeste);font-size:18px;font-weight:bold;margin:6px 0}
.badge-img{height:20px;width:auto;border-radius:4px;vertical-align:middle}
.btn{display:block;background:var(--celeste);color:#000;padding:12px;border-radius:8px;text-decoration:none;font-weight:bold;font-size:15px;margin-top:8px;text-align:center}
.btn-verde{background:var(--verde)}
.btn-morado{background:var(--morado);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--celeste);color:var(--celeste)}
.footer{color:#aaa;font-size:12px;padding:20px;background:rgba(18,18,18,0.8)} /* FOOTER MÁS OSCURO */
.sub{color:#aaa;font-size:14px;margin-bottom:15px}
img.producto-img, img.comandos-img{width:100%;border-radius:12px;margin:15px 0;border:1px solid var(--gris2)}
.precio-big{font-size:32px;color:var(--celeste);font-weight:bold;margin:15px 0}
.ahorro{color:#00FF88;font-size:13px;margin-top:-10px;margin-bottom:15px}
.lista{text-align:left;background:var(--gris2);border-radius:10px;padding:12px;margin:15px 0;font-size:14px;line-height:1.6}
.metodo{background:#222;border:1px solid #333;border-radius:10px;padding:15px;margin:12px 0;text-align:left}
.metodo b{color:var(--celeste);font-size:16px}
.dato{font-size:15px;margin:6px 0;color:#eee;letter-spacing:1px;user-select: all;}
.aviso{background:rgba(0,217,255,0.1);border-left:3px solid var(--celeste);padding:10px;border-radius:6px;font-size:13px;margin:15px 0;text-align:left}
.volver{display:block;color:#aaa;font-size:13px;margin-top:10px;text-decoration:none}
.top-btns{display:flex;gap:8px;margin-bottom:15px}
</style>
</head>
<body>

<header><h1>FOR THREE BOT</h1><p class="slogan">100% ESTABLE 24/7 | ENTREGA INMEDIATA</p></header>

<div class="verificado">
  <b>✅ Vendedor Verificado Ica | +50 Bots Vendidos</b>
  <p>Atención directa por WhatsApp. Respondo en menos de 5 min.</p>
</div>

<div class="container" id="app"></div>

<footer class="footer">© 2026 FOR THREE BOT | Ica, Perú<br>💳 Yape / Prex / WhatsApp: 936 994 155</footer>

<script>
const datos = {
  whatsapp: "51936994155",
  yape: "936 994 155",
  nombre: "Tu Nombre Completo", // CAMBIA ESTO
  cci: "00231000123456789012", // CAMBIA ESTO
  img: "https://files.evogb.win/BLG4n2.jpg",
  comandosImg: "https://files.evogb.win/eMe9xu.jpg",
  grupoWhatsApp: "https://chat.whatsapp.com/LjPhgjqCM934QEzYz3vrVk",
  productos: {
    "X1": {nombre: "Grupo X1", precio: "S/ 5", sub: "Bot para 1 Grupo | 1 Solo Pago", ahorro: "", incluye: "✅ Bot completo<br>✅ Para 1 grupo de WhatsApp<br>✅ Comandos:.menu.sticker.play.ia<br>✅ Logo Biselelado FOR THREE<br>✅ Instalación + Soporte 24/7"},
    "X3": {nombre: "Grupo X3", precio: "S/ 10", sub: "Bot para 3 Grupos | 1 Solo Pago", ahorro: "", incluye: "✅ Bot completo<br>✅ Para 3 grupos de WhatsApp<br>✅ Todos los comandos incluidos<br>✅ Logo Biselelado FOR THREE<br>✅ Instalación + Soporte 24/7"},
    "X5": {nombre: "Grupo X5", precio: "S/ 15", sub: "Bot para 5 Grupos | 1 Solo Pago", ahorro: "Ahorras S/ 10 vs comprar 5 veces el X1", incluye: "✅ Mismo bot completo que el X1<br>✅ Para 5 grupos distintos<br>✅ Comandos:.menu.sticker.play.ia.frases<br>✅ Logo Biselelado FOR THREE<br>✅ Instalación + Soporte 24/7"},
    "PERSONALIZADO": {
      nombre: "Bot Personalizado",
      precio: "S/ 16",
      precioReal: "S/ 18",
      sub: "Tu Bot, Tus Reglas",
      ahorro: "🔥 Oferta Hoy: Ahorras S/ 2. Solo 2 cupos",
      tag: "OFERTA",
      incluye: "✅ Bot desde cero a tu gusto<br>✅ Comandos personalizados<br>✅ Nombre + Logo exclusivo<br>✅ Menú a tu estilo<br>✅ Instalación + Soporte 24/7"
    },
    "SERVIDOR": {nombre: "Servidor 24/7", precio: "S/ 10", sub: "Hosting para tu Bot", ahorro: "", incluye: "✅ Bot siempre online 24/7<br>✅ Sin caídas ni lag<br>✅ Panel para reiniciar<br>✅ Te lo instalo todo yo<br>✅ Soporte 24/7"},
    "COMBO": {
      nombre: "Combo For",
      precio: "S/ 22",
      precioReal: "S/ 25",
      sub: "X5 + Servidor 24/7",
      ahorro: "🔥 Oferta Hoy: Ahorras S/ 3. Voy 3/5 cupos",
      tag: "OFERTA",
      incluye: "✅ Bot para 5 grupos<br>✅ + Servidor 24/7 incluido<br>✅ Todo instalado y listo<br>✅ Logo FOR THREE<br>✅ Soporte 24/7"
    }
  }
};

const app = document.getElementById('app');
const params = new URLSearchParams(window.location.search);
const page = params.get('page');
const id = params.get('id');

function renderCatalogo(){
  let html = `<div class="oferta-box">
      <b>🔥 OFERTAS POR TIEMPO LIMITADO</b>
      <p>Combo y Personalizado con descuento solo por cupos limitados</p>
    </div>`;
  html += `<div class="top-btns">
      <a class="btn btn-morado" href="?page=comandos">🚀 Probar Bot</a>
    </div>`;
  for(const key in datos.productos){
    const p = datos.productos[key];
    const precioHtml = p.precioReal? `<span class="tachado">${p.precioReal}</span> ${p.precio}` : p.precio;
    html += `<div class="card">
      ${p.tag? `<div class="tag-oferta">${p.tag}</div>` : ''}
      <div class="nombre">${p.nombre} <img src="${datos.img}" class="badge-img" alt="FOR THREE BOT"></div>
      <div class="precio">${precioHtml}</div>
      <a class="btn" href="?page=producto&id=${key}">Ver Producto</a>
    </div>`;
  }
  app.innerHTML = html;
}

function renderComandos(){
  app.innerHTML = `<div class="box">
    <h1>Comandos FOR THREE BOT <img src="${datos.img}" class="badge-img" alt="FOR THREE BOT"></h1>
    <p class="sub">Prueba todos los comandos aquí</p>
    <img src="${datos.comandosImg}" class="comandos-img" alt="Lista de Comandos">
    <a class="btn btn-morado" href="${datos.grupoWhatsApp}" target="_blank">🚀 Probar Ahora</a>
    <a class="volver" href="?">← Volver a Tienda</a>
  </div>`;
}

function renderProducto(){
  const p = datos.productos[id];
  if(!p){ app.innerHTML = `<div class="box"><h1>Producto no encontrado</h1><a class="volver" href="?">← Volver</a></div>`; return; }
  const precioBigHtml = p.precioReal? `<span class="tachado">${p.precioReal}</span> ${p.precio}` : p.precio;
  app.innerHTML = `<div class="box"><h1>${p.nombre} <img src="${datos.img}" class="badge-img" alt="FOR THREE BOT"></h1><p class="sub">${p.sub}</p><img src="${datos.img}" class="producto-img" alt="Demo"><h2 class="precio-big">${precioBigHtml}</h2>${p.ahorro? `<p class="ahorro">${p.ahorro}</p>` : ''}<div class="lista"><b>Qué incluye:</b><br>${p.incluye}</div><a class="btn" href="?page=pago&id=${id}">Comprar Ahora</a><a class="btn btn-outline" href="https://wa.me/${datos.whatsapp}?text=Hola%20duda%20${encodeURIComponent(p.nombre)}" target="_blank">Tengo una Duda</a><a class="volver" href="?">← Volver</a></div>`;
}

function renderPago(){
  const p = datos.productos[id];
  if(!p){ app.innerHTML = `<div class="box"><h1>Producto no encontrado</h1><a class="volver" href="?">← Volver</a></div>`; return; }
  const mensaje = encodeURIComponent(`Bro ya te deposité ✅\n\nMonto: ${p.nombre} ${p.precio}\nAcá está mi captura 📸`);
  app.innerHTML = `<div class="box"><h1>Métodos de Pago</h1><div class="producto" style="color:#00FF88;font-weight:bold;font-size:16px;margin-bottom:20px">${p.nombre} ${p.precio}</div><div class="metodo"><b>1. Yape / Plin</b><div class="dato">${datos.yape}</div><div class="dato">A nombre de: ${datos.nombre}</div></div><div class="metodo"><b>2. Prex Perú</b><div class="dato">${datos.yape}</div></div><div class="metodo"><b>3. Transferencia BCP</b><div class="dato">CCI: ${datos.cci}</div></div><div class="aviso">⚠️ Deposita el monto exacto, toma captura y dale al botón.</div><a class="btn btn-verde" href="https://wa.me/${datos.whatsapp}?text=${mensaje}" target="_blank">✅ Ya Deposité</a><a class="volver" href="?page=producto&id=${id}">← Volver</a></div>`;
}

if(page === 'producto') renderProducto();
else if(page === 'pago') renderPago();
else if(page === 'comandos') renderComandos();
else renderCatalogo();
</script>
</body>
</html>
