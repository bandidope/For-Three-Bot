<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>For Three Store</title>
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  <!-- INICIO -->
  <div id="inicioScreen" class="screen active">
    <div class="hero">
      <img src="https://i.ibb.co/3y0p0sP/bot-vip.jpg" alt="For Three">
      <h1>For Three Store</h1>
      <p>Bots, Activaciones y Servicios al instante</p>
      <button class="btn" onclick="show('tiendaScreen')">Ver Productos</button>
    </div>
  </div>

  <!-- TIENDA -->
  <div id="tiendaScreen" class="screen">
    <header>
      <div class="topbar">
        <div class="logo" onclick="show('inicioScreen')">FOR THREE</div>
        <button id="themeBtn" class="theme-btn">🌙</button>
      </div>
    </header>
    <div class="grid" id="productos"></div>
  </div>

  <!-- PRODUCTO -->
  <div id="productoScreen" class="screen">
    <header><div class="topbar"><button class="back" onclick="show('tiendaScreen')">←</button><div class="logo">DETALLE</div><span></span></div></header>
    <div class="p-wrap">
      <img id="pImg" alt="">
      <div class="tag" id="pMarca"></div>
      <h2 id="pNom"></h2>
      <div class="precio" id="pPrecio"></div>
      <ul class="p-desc" id="pDesc"></ul>
      <button class="btn" id="comprarBtn">Contratar Ahora</button>
    </div>
  </div>

  <!-- REPRODUCTOR FLOTANTE ESTILO EVOGB -->
  <div class="music-player" id="musicPlayer">
    <div class="player-header" onclick="togglePlayer()">
      <span id="songName">audioNormal.mp3</span>
      <span>▼</span>
    </div>
    <div class="player-controls">
      <button onclick="prevSong()">⏮️</button>
      <button id="playBtn" onclick="togglePlay()">▶️</button>
      <button onclick="nextSong()">⏭️</button>
    </div>
    <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="0.8">
    <audio id="bgMusic" loop preload="auto">
      <source src="audioNormal.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js?v=7"></script>
</body>
</html>
