<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>For Three Bot</title><style>:root[data-theme="dark"]{--bg:#0a0a0f;--card:#0f172a;--text:#f1f5f9;--muted:#94a3b8;--cyan:#00e5ff;--border:#1e293b;--green:#25D366}:root[data-theme="light"]{--bg:#f1f5f9;--card:#fff;--text:#0f172a;--muted:#64748b;--cyan:#0891b2;--border:#cbd5e1;--green:#16a34a}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;padding:16px}.screen{display:none}.screen.active{display:block}.topbar{display:flex;justify-content:space-between}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}.card-img{height:140px;background-size:cover}.card-body{padding:12px}.card-price{color:var(--cyan);font-weight:800}.btn{background:var(--cyan);color:#000;border:0;padding:12px;border-radius:10px;width:100%;font-weight:800;margin-top:8px}</style></head><body><div id="tiendaScreen" class="screen active"><div class="topbar"><h2>For Three Bot</h2><button id="currencyBtn" onclick="alert('USD, PEN, ARS')">🌎 PEN</button></div><div class="grid" id="productos">Cargando...</div></div><script>let currentTC=3.70;const products=[{nom:"Bot Grupos",precio:5,img:"https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=600"},{nom:"Hosting 1GB",precio:10,img:"https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=600"}];async function getTipoCambio(){try{const r=await fetch('https://api.exchangerate-api.com/v4/latest/USD');const j=await r.json();currentTC=j.rates.PEN}catch(e){currentTC=3.70}renderProductos()}function renderProductos(){document.getElementById('productos').innerHTML=products.map(p=>`<div class="card"><div class="card-img" style="background-image:url('${p.img}')"></div><div class="card-body"><div>${p.nom}</div><div class="card-price">S/ ${p.precio}.00</div><button class="btn">Comprar</button></div></div>`).join('')}document.addEventListener('DOMContentLoaded',getTipoCambio);</script></body></html>
