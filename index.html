<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>For Three Store</title>
  <link rel="stylesheet" href="style.css?v=13">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="inicioScreen" class="screen active">
    <div class="hero">
      <div class="logo-3d">F3</div>
      <h1>FOR THREE STORE</h1>
      <p>Servicios Digitales al Instante</p>
      <button class="btn-glow" onclick="startApp()">Explorar Tienda</button> <!-- <- NUEVO -->
    </div>
  </div>

  <div id="tiendaScreen" class="screen">
    <header><div class="topbar"><div class="logo" onclick="startApp()">F3</div><button id="themeBtn" class="icon-btn">🌙</button></div></header>
    <div class="grid" id="productos"></div>
  </div>

  <div id="productoScreen" class="screen">
    <header><div class="topbar"><button class="icon-btn" onclick="show('tiendaScreen')">←</button><div class="logo">DETALLE</div><span></span></div></header>
    <div class="p-wrap">
      <div class="img-box"><img id="pImg" alt=""></div>
      <div class="tag" id="pMarca"></div><h2 id="pNom"></h2>
      <div class="precio" id="pPrecio"></div><ul class="p-desc" id="pDesc"></ul>
      <button class="btn-glow" id="comprarBtn">Contratar Ahora</button>
    </div>
  </div>

  <div id="pagoModal" class="modal">
    <div class="modal-box">
      <div class="modal-header"><h3>Checkout</h3><button class="x" onclick="cerrarPago()">×</button></div>
      <div class="modal-body">
        <div id="serviceCard" class="service-card"></div>
        <div class="coupon-box">
          <div id="couponInput" class="coupon-input"><input id="couponCode" placeholder="Código F3DIEZ"><button class="btn-apply" onclick="applyCoupon()">Aplicar</button></div>
          <div id="couponApplied" class="coupon-applied" style="display:none"><span id="couponText"></span><button class="btn-remove" onclick="removeCoupon()">×</button></div>
        </div>
        <div class="payment-tabs">
          <button class="payment-tab active" onclick="selectPayment('yape', event)">Yape</button>
          <button class="payment-tab" onclick="selectPayment('bank', event)">BCP</button>
          <button class="payment-tab" onclick="selectPayment('prex', event)">Prex</button>
          <button class="payment-tab" onclick="selectPayment('paypal', event)">PayPal</button>
        </div>
        <div id="yapeContent" class="payment-content active"><div class="payment-box"><b>Pagar con Yape</b><div class="amount" id="montoYape">S/ 0.00</div><div class="copy-box"><span>Número: <b id="yapeNum"></b></span><button class="copy-btn" onclick="copyText(yapeNum.textContent)">Copiar</button></div></div></div>
        <div id="bankContent" class="payment-content"><div class="payment-box"><b>Transferencia BCP</b><div class="amount" id="montoTarjeta">S/ 0.00</div><div class="copy-box"><span>CCI: <b id="bcpCci"></b></span><button class="copy-btn" onclick="copyText(bcpCci.textContent)">Copiar</button></div></div></div>
        <div id="prexContent" class="payment-content"><div class="payment-box"><b>Pagar con Prex</b><div class="amount" id="montoPrex">S/ 0.00</div><div class="copy-box"><span>Número: <b id="prexNum"></b></span><button class="copy-btn" onclick="copyText(prexNum.textContent)">Copiar</button></div></div></div>
        <div id="paypalContent" class="payment-content"><div class="payment-box"><b>Pagar con PayPal</b><div class="amount" id="montoPaypal">$0.00 USD</div><a id="paypalLink" class="btn-glow" target="_blank">Pagar en PayPal</a></div></div>
        <button id="wspBtn" class="btn-wsp">Enviar Comprobante por WhatsApp</button>
      </div>
    </div>
  </div>

  <div class="music-player" id="musicPlayer">
    <div class="player-header" onclick="togglePlayer()"><span id="songName">audioNormal.mp3</span><span>▼</span></div>
    <div class="player-controls"><button onclick="prevSong()">⏮️</button><button id="playBtn" onclick="togglePlay()">▶️</button><button onclick="nextSong()">⏭️</button></div>
    <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="0.8">
    <audio id="bgMusic" loop preload="auto"><source src="audioNormal.mp3" type="audio/mpeg"></audio>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js?v=13"></script>
</body>
</html>
