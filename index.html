<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>For Three Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--card:#0f172a;--text:#f1f5f9;--muted:#94a3b8;--cyan:#00e5ff;--border:#1e293b;--green:#25D366;--yape:#7200ff}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding-bottom:70px}
.screen{display:block;min-height:100vh}
header{position:sticky;top:0;background:var(--bg);z-index:10;padding:14px 16px;border-bottom:1px solid var(--border)}
.topbar{display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:800;font-size:1.3rem}
.icon-btn{background:0;border:0;color:var(--text);font-size:1.2rem;cursor:pointer}
.theme-btn{background:var(--card);border:1px solid var(--border);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:.2s}
.theme-btn:hover{border-color:var(--cyan)}
.tabs{display:flex;gap:24px;justify-content:center;margin-top:14px}
.tab{color:var(--muted);font-weight:600;cursor:pointer;padding-bottom:8px;border-bottom:2px solid transparent}
.tab.active{color:var(--cyan);border-color:var(--cyan)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.3s}
.card-img{height:140px;background:#000;position:relative;background-size:cover;background-position:center}
.tag{position:absolute;top:10px;left:10px;background:var(--cyan);color:#0a0a0f;font-size:.65rem;font-weight:800;padding:4px 10px;border-radius:6px}
.card-body{padding:12px}
.card-cat{font-size:.65rem;color:var(--muted);margin-bottom:4px}
.card-title{font-size:.9rem;font-weight:700;margin-bottom:8px;min-height:38px}
.card-price{font-size:1.1rem;font-weight:800;margin-bottom:8px;color:var(--cyan)}
.btn-contratar{width:100%;background:var(--cyan);color:#0a0a0f;border:0;padding:12px 8px;border-radius:10px;font-weight:800;cursor:pointer;font-size:.9rem}
.features{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px 16px}
.feature{display:flex;gap:10px;align-items:flex-start;font-size:.85rem}
.feature span{color:var(--muted)}
footer{padding:20px;text-align:center;font-size:.8rem;color:var(--muted);border-top:1px solid var(--border)}
.wsp-float{position:fixed;bottom:16px;right:16px;width:54px;height:54px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(0,0,0,.4);cursor:pointer;z-index:50}
.wsp-float svg{width:28px;height:28px;fill:#fff}
.product-wrap{padding:16px;max-width:600px;margin:0 auto}
.product-img{width:100%;height:240px;background-size:cover;background-position:center;border-radius:16px;margin-bottom:16px;border:1px solid var(--border)}
.product-title{font-size:1.6rem;font-weight:800;margin-bottom:8px}
.product-price{font-size:2rem;font-weight:800;color:var(--cyan);margin-bottom:14px}
.product-desc{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:18px}
.product-list{list-style:none;margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.product-list li{padding:10px 0;border-bottom:1px solid var(--border);font-size:.9rem;display:flex;gap:8px}
.product-list li:last-child{border:0}
.product-list li b{color:var(--cyan);font-size:1.1rem}
.btn-comprar{width:100%;background:var(--green);color:#fff;text-align:center;border:0;padding:16px;border-radius:12px;font-weight:800;cursor:pointer;font-size:1.05rem;margin-bottom:10px;box-shadow:0 4px 15px rgba(37,211,102,.3)}
.btn-volver-prod{width:100%;background:var(--card);color:var(--text);border:1px solid var(--border);padding:16px;border-radius:12px;font-weight:800;cursor:pointer;font-size:1.05rem}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;z-index:99;padding:16px}
.modal.active{display:flex}
.modal-box{background:var(--card);border:1px solid var(--cyan);border-radius:20px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,229,255,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:1.2rem;font-weight:800}
.x{background:rgba(255,255,255,.1);border:0;width:32px;height:32px;border-radius:50%;font-size:1.3rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.amount{font-size:2.2rem;font-weight:800;color:var(--cyan);margin:16px 18px;text-align:center}
.payment-content{padding:0 18px 18px}
.copy-box{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.1);padding:12px 14px;border-radius:12px;margin:12px 0;font-size:.9rem;border:1px solid var(--border)}
.copy-btn{padding:8px 16px;background:var(--cyan);border:0;border-radius:10px;color:#0a0a0f;font-weight:800;cursor:pointer;font-size:.85rem}
.info-text{color:var(--muted);font-size:.8rem;text-align:center;margin:12px 0;line-height:1.5}
.btn-wsp{width:100%;background:var(--green);color:#fff;border:0;padding:14px;border-radius:12px;font-weight:800;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 15px rgba(37,211,102,.3)}
.toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--cyan);padding:10px 14px;border-radius:8px;opacity:0;transition:.2s;z-index:999;font-weight:600}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="tiendaScreen" class="screen">
<header>
<div class="topbar">
<div class="logo">For Three Bot</div>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>
<div class="tabs"><div class="tab active" onclick="setTab('bots', this)">Bots</div><div class="tab" onclick="setTab('hosting', this)">Hosting</div></div>
</header>
<div class="grid" id="productos"></div>
<div class="features">
<div class="feature"><div>⚡</div><div><b>Entrega Inmediata</b><br><span>Por WhatsApp</span></div></div>
<div class="feature"><div>💜</div><div><b>Yape, Tarjeta, Prex</b><br><span>3 métodos</span></div></div>
<div class="feature"><div>🛠️</div><div><b>Soporte 24/7</b><br><span>Te ayudo</span></div></div>
<div class="feature"><div>✅</div><div><b>+200 Clientes</b><br><span>En Perú</span></div></div>
</div>
<footer>© 2026 For Three Bot | WhatsApp: +51 936 994 155</footer>
</div>

<div id="productScreen" class="screen" style="display:none">
<header><div class="topbar"><button class="icon-btn" onclick="showTienda()">←</button><div class="logo">Detalle Producto</div><span></span></div></header>
<div class="product-wrap" id="productDetail"></div>
</div>

<div id="pagoModal" class="modal"><div class="modal-box">
<div class="modal-header"><h3>Checkout</h3><button class="x" onclick="cerrarPago()">×</button></div>
<div class="amount" id="montoTotal">S/ 0.00</div>
<div id="yapeContent" class="payment-content">
<div class="copy-box"><span><b>Número:</b> <span id="yapeNum">936994155</span></span><button class="copy-btn" onclick="copyText('936994155')">Copiar</button></div>
<p class="info-text">Yapea al número. Luego envía el comprobante.</p>
</div>
<div style="padding:0 18px 18px;"><button id="wspBtn" class="btn-wsp">💬 Enviar Comprobante por WhatsApp</button></div>
</div></div>

<a class="wsp-float" href="https://wa.me/51936994155" target="_blank"><svg viewBox="0 0 32 32"><path d="M16 3C9.4 3 4 8.4 4 15c0 2.7.9 5.2 2.4 7.2L4 29l7-2.3c1.9 1 4.1 1.6 6.4 1.6 6.6 0 12-5.4 12-12S22.6 3 16 3z"/></svg></a>
<div id="toast" class="toast"></div>

<script>
const productosBots=[{id:1,nom:"Bot Para Grupos WhatsApp",precio:5,img:"https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=600&auto=format&fit=crop",desc:"El bot más completo para administrar grupos de WhatsApp. Funciona 24/7 sin caídas. Incluye instalación y configuración gratis.",features:["Descargas YouTube, TikTok, FB, IG ilimitadas","Juegos: PPT, Trivia, Match, Ahorcado","IA ChatGPT + Sticker + Logo IA","Panel Admin: Kick, Promote, Ban","Soporte 24/7 por WhatsApp"]},{id:2,nom:"Bot Personalizado VIP",precio:25,img:"https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=600&auto=format&fit=crop",desc:"Tu propio bot con tu marca, tu nombre y comandos exclusivos. 100% único para ti. No se vende a nadie más.",features:["Todo lo del Bot Grupos incluido","Comandos personalizados a tu gusto","Logo y nombre propio del bot","Hosting 1GB RAM gratis 1 mes","Soporte prioritario 24/7"]}];
const productosHosting=[{id:3,nom:"Hosting 1GB RAM",precio:10,img:"https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=600&auto=format&fit=crop",desc:"Hosting perfecto para 1 bot pequeño o mediano. 99.9% Uptime garantizado. Sin lag.",features:["1GB RAM + 10GB SSD NVMe","Node.js 20 + Python 3.11","Panel Pterodactyl completo","Backups automáticos diarios","Soporte técnico 24/7"]},{id:4,nom:"Hosting 4GB RAM",precio:25,img:"https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=600&auto=format&fit=crop",desc:"Para 3-4 bots o bots pesados con IA. Máxima potencia sin caídas.",features:["4GB RAM + 40GB SSD NVMe","Node.js 20 + Python 3.11","Panel Pterodactyl completo","DDoS Protection incluido","Soporte prioritario 24/7"]}];
let currentTab='bots';let currentProduct=null;

function setTab(tab,el){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderProductos()}
function renderProductos(){const data=currentTab==='bots'?productosBots:productosHosting;document.getElementById('productos').innerHTML=data.map(p=>`<div class="card"><div class="card-img" style="background-image:url('${p.img}')"><span class="tag">DIGITAL</span></div><div class="card-body"><div class="card-cat">${currentTab.toUpperCase()}</div><div class="card-title">${p.nom}</div><div class="card-price">S/ ${p.precio}.00</div><button class="btn-contratar" onclick="verInfo(${p.id})">Información</button></div></div>`).join('')}
function verInfo(id){const data=currentTab==='bots'?productosBots:productosHosting;currentProduct=data.find(p=>p.id===id);document.getElementById('productDetail').innerHTML=`<div class="product-img" style="background-image:url('${currentProduct.img}')"></div><div class="product-title">${currentProduct.nom}</div><div class="product-price">S/ ${currentProduct.precio}.00</div><div class="product-desc">${currentProduct.desc}</div><ul class="product-list">${currentProduct.features.map(f=>`<li><b>✓</b> <span>${f}</span></li>`).join('')}</ul><button class="btn-comprar" onclick="abrirPago()">Comprar</button><button class="btn-volver-prod" onclick="showTienda()">← Volver a la Tienda</button>`;document.getElementById('tiendaScreen').style.display='none';document.getElementById('productScreen').style.display='block'}
function showTienda(){document.getElementById('tiendaScreen').style.display='block';document.getElementById('productScreen').style.display='none'}

function abrirPago(){document.getElementById('montoTotal').textContent=`S/ ${currentProduct.precio}.00`;document.getElementById('pagoModal').classList.add('active')}
function cerrarPago(){document.getElementById('pagoModal').classList.remove('active')}
function copyText(t){navigator.clipboard.writeText(t);toast('Copiado')}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
document.getElementById('wspBtn').onclick=()=>{window.open(`https://wa.me/51936994155?text=${encodeURIComponent(`Hola! Comprobante de ${currentProduct.nom} - S/ ${currentProduct.precio}.00`)}`,'_blank')}

const themeBtn=document.getElementById('themeBtn');
function loadTheme(){const s=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',s);themeBtn.textContent=s==='dark'?'🌙':'☀️'}
function toggleTheme(){const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);themeBtn.textContent=n==='dark'?'🌙':'☀️';toast(n==='dark'?'Modo Oscuro':'Modo Claro')}
loadTheme();
renderProductos();
</script>
</body>
</html>
