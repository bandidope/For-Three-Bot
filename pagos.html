<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Métodos de Pago | FOR THREE BOT</title>
<style>
:root{--celeste:#00D9FF;--negro:#0a0a0a;--gris:#1a1a1a;--verde:#00FF88}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{color:#fff;text-align:center;min-height:100vh;padding:20px;background: linear-gradient(rgba(10,10,10,0.92), rgba(10,10,10,0.92)), url('https://raw.githubusercontent.com/bandidope/Fotos/refs/heads/master/fotos/logo.png') no-repeat center fixed;background-size: cover;}
.box{max-width:500px;margin:20px auto;background:rgba(26,26,26,0.95);border:1px solid var(--celeste);border-radius:16px;padding:25px;backdrop-filter: blur(5px)}
h1{color:var(--celeste);font-size:24px;margin-bottom:10px}
.producto{color:#00FF88;font-weight:bold;font-size:16px;margin-bottom:20px}
.metodo{background:#222;border:1px solid #333;border-radius:10px;padding:15px;margin:12px 0;text-align:left}
.metodo b{color:var(--celeste);font-size:16px}
.dato{font-size:15px;margin:6px 0;color:#eee;letter-spacing:1px}
.aviso{background:rgba(0,217,255,0.1);border-left:3px solid var(--celeste);padding:10px;border-radius:6px;font-size:13px;margin:15px 0;text-align:left}
.btn{display:block;background:var(--verde);color:#000;padding:15px;border-radius:10px;text-decoration:none;font-weight:bold;font-size:16px;margin:15px 0}
.volver{display:block;color:#aaa;font-size:13px;margin-top:10px;text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <h1>Métodos de Pago</h1>
  <div class="producto" id="producto-nombre">Cargando...</div>
  <div class="metodo"><b>1. Yape / Plin</b><div class="dato">936 994 155</div><div class="dato">A nombre de: [Tu Nombre]</div></div>
  <div class="metodo"><b>2. Prex Perú</b><div class="dato">936 994 155</div></div>
  <div class="metodo"><b>3. Transferencia BCP</b><div class="dato">CCI: [Pon tu CCI aquí]</div></div>
  <div class="aviso">⚠️ Importante: Haz el depósito, toma captura y dale al botón.</div>
  <a class="btn" id="btn-whatsapp" href="#" target="_blank">✅ Ya Deposité - Enviar Captura</a>
  <a class="volver" href="index.html">← Volver al Catálogo</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const producto = params.get('producto') || 'FOR THREE BOT';
document.getElementById('producto-nombre').innerText = producto;
const mensaje = encodeURIComponent(`Bro ya te deposité ✅\n\nAcá está mi captura 📸\nQuiero: ${producto}`);
document.getElementById('btn-whatsapp').href = `https://wa.me/51936994155?text=${mensaje}`;
</script>
</body>
</html>
